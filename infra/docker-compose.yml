services:
  postgres:
    image: postgres:16
    container_name: pieuvre-postgres
    restart: unless-stopped
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: pieuvre
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme_en_prod}
    networks:
      - pieuvre-net
    shm_size: '256mb'
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=64MB
        -c maintenance_work_mem=512MB
        -c max_connections=200

  mongo:
    image: mongo:7
    container_name: pieuvre-mongo
    restart: unless-stopped
    ports:
      - "0.0.0.0:27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: pieuvre
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_en_prod}
    networks:
      - pieuvre-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pieuvre-pgadmin
    restart: unless-stopped
    ports:
      - "0.0.0.0:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@pieuvre.dev
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    networks:
      - pieuvre-net

  mongo-express:
    image: mongo-express
    container_name: pieuvre-mongo-express
    restart: unless-stopped
    ports:
      - "0.0.0.0:8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: pieuvre
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-changeme_en_prod}
      ME_CONFIG_MONGODB_URL: mongodb://pieuvre:${MONGO_PASSWORD:-changeme_en_prod}@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo
    networks:
      - pieuvre-net

  dozzle:
    image: amir20/dozzle:latest
    container_name: pieuvre-dozzle
    restart: unless-stopped
    ports:
      - "0.0.0.0:9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_ENABLE_ACTIONS: "true"

networks:
  pieuvre-net:
    name: pieuvre-net
    driver: bridge

volumes:
  pg_data:
  mongo_data:
